<!doctype html> <!--ReqH1-->
<html lang="en-GB"> <!--ReqH1-->

<head>
    <meta charset="utf-8"> <!--ReqH2-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!--ReqH2-->
    <title>Contact Form – Personal Finance Tracker</title> <!--ReqH2-->
    <meta name="author" content="Gautham Pillai"> <!--ReqH2-->
    <meta name="description" content="Contact and feedback form"> <!--ReqH2-->
    <meta name="keywords" content="contact, feedback, finance"> <!--ReqH2-->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/contact.css">
    <script src="js/myjs.js" defer></script>
    <!-- ReqI5 ReqI6 – i18n module loaded with defer -->
    <script src="js/i18n/i18n.js" defer></script>
</head>

<body>

<header> <!--ReqH3-->
    <!-- ReqI1 – page heading and tagline marked with data-i18n -->
    <h1 data-i18n="pages.contact.pageTitle">Contact Us</h1> <!--ReqH5-->
    <p><strong data-i18n="pages.contact.pageTagline">Get in touch – we read every message.</strong></p> <!--ReqH6-->
</header>

<nav> <!--ReqH3-->
    <ul> <!--ReqH8-->
        <!-- ReqI1 – navigation links marked with data-i18n -->
        <li><a href="index.html" target="_self" data-i18n="navigation.home">🏠 Home</a></li>
        <li><a href="expenses.html" target="_self" data-i18n="navigation.expenses">📊 Expense Tracker</a></li>
        <li><a href="contact.html" target="_self" data-i18n="navigation.contact">✉ Contact</a></li>
        <li><a href="https://groww.in/blog/financial-planning-for-beginners" target="_blank"
                data-i18n="navigation.learnFinance">🌐 Learn Finance</a></li> <!--ReqH9-->
    </ul>
    <!-- ReqI7 – language selector injected here by i18n.js -->
</nav>

<main> <!--ReqH3-->

    <form id="contactForm" name="contactForm" method="post" action="mailto:gauthampillai23@gmail.com"> <!--ReqH16, ReqJ4-->

        <div id="error-box" role="alert"></div> <!--ReqJ5-->

        <fieldset> <!--ReqH20-->
            <!-- ReqI1 – fieldset legend marked with data-i18n -->
            <legend data-i18n="pages.contact.legendUserDetails">User Details</legend>

            <!-- ReqI1 – labels and inputs; placeholders via data-i18n-placeholder -->
            <label for="name">
                <span data-i18n="pages.contact.labelName">Full Name (first &amp; last):</span>
                <span class="required-star">*</span>
            </label> <!--ReqH17-->
            <input type="text" id="name" name="name"
                   placeholder="e.g., Jane Smith"
                   data-i18n-placeholder="pages.contact.labelName"
                   required> <!--ReqH17, ReqJ3, ReqJ7, ReqJ8-->

            <label for="email">
                <span data-i18n="pages.contact.labelEmail">Email Address:</span>
                <span class="required-star">*</span>
            </label> <!--ReqH17-->
            <!-- ReqI – type="email" provides built-in pattern validation -->
            <input type="email" id="email" name="email"
                   placeholder="e.g., jane@example.com"
                   required> <!--ReqH17, ReqJ7, ReqJ8-->

            <label for="password">
                <span data-i18n="pages.contact.labelPassword">Password:</span>
            </label> <!--ReqH17-->
            <input type="password" id="password" name="password"
                   placeholder="At least 4 characters" minlength="4"> <!--ReqH17, ReqJ7, ReqJ8-->

            <label for="phone">
                <span data-i18n="pages.contact.labelPhone">Phone (10 digits):</span>
                <span class="required-star">*</span>
            </label> <!--ReqH17, ReqH19-->
            <!-- ReqI – pattern validation on phone field -->
            <input type="tel" id="phone" name="phone"
                   placeholder="e.g., 0712345678"
                   pattern="[0-9]{10}" title="Enter exactly 10 digits"
                   required> <!--ReqH17, ReqH19, ReqJ3, ReqJ7, ReqJ8-->

            <label for="message">
                <span data-i18n="pages.contact.labelMessage">Message (min 10 characters):</span>
                <span class="required-star">*</span>
            </label> <!--ReqH17-->
            <textarea id="message" name="message" rows="5"
                      placeholder="Write your message here..." required></textarea> <!--ReqH17, ReqJ2, ReqJ3, ReqJ7, ReqJ8-->

        </fieldset>

        <fieldset> <!--ReqH20-->
            <legend data-i18n="pages.contact.legendGender">Gender</legend>
            <label class="inline-label"><input type="radio" name="gender" value="male"> <span data-i18n="pages.contact.male">Male</span></label>
            <label class="inline-label"><input type="radio" name="gender" value="female"> <span data-i18n="pages.contact.female">Female</span></label>
        </fieldset>

        <fieldset> <!--ReqH20-->
            <legend data-i18n="pages.contact.legendInterests">Interests</legend>
            <label class="inline-label"><input type="checkbox" name="interest" value="saving"> <span data-i18n="pages.contact.interestSaving">Saving</span></label>
            <label class="inline-label"><input type="checkbox" name="interest" value="investing"> <span data-i18n="pages.contact.interestInvesting">Investing</span></label>
        </fieldset>

        <!-- ReqI1 – country label and select option marked -->
        <label for="country" data-i18n="pages.contact.labelCountry">Country:</label> <!--ReqH20-->
        <select id="country" name="country"> <!--ReqJ2-->
            <option value="" disabled selected data-i18n="pages.contact.optionSelect">— Select —</option>
            <optgroup label="Europe" data-i18n-label="pages.contact.optgroupEurope">
                <option value="Spain">Spain</option>
                <option value="France">France</option>
            </optgroup>
            <optgroup label="Asia" data-i18n-label="pages.contact.optgroupAsia">
                <option value="India">India</option>
                <option value="Japan">Japan</option>
            </optgroup>
        </select>

        <br><br>

        <!-- ReqI1 – buttons marked with data-i18n -->
        <button type="submit" id="submitBtn" data-i18n="pages.contact.btnSubmit">Submit</button> <!--ReqH18-->
        <button type="reset" id="resetBtn" data-i18n="pages.contact.btnReset">Reset</button> <!--ReqH18-->

    </form>

    <!-- ReqI1 – live preview default text -->
    <div id="preview" data-i18n="pages.contact.previewDefault">Live Preview — start typing to see your summary here.</div> <!--ReqJ2-->

</main>

<footer> <!--ReqH3-->
    <p data-i18n="footer.copyright">© 2026 Personal Finance Tracker</p>
</footer>

</body>
</html>
